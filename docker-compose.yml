services:
  # Serviço do Backend (ASP.NET Core 10.0 Web API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: conektafinance-backend
    restart: always
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/data

  # Serviço do Frontend (Nginx servindo arquivos estáticos e atuando como proxy reverso)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: conektafinance-frontend
    restart: always
    ports:
      - "9001:80"
    labels:
      - "traefik.docker.network=dokploy-network"
    networks:
      - default
      - dokploy-network
    depends_on:
      - backend

volumes:
  sqlite_data:
    driver: local

networks:
  dokploy-network:
    external: true
