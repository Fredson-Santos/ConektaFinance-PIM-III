<main class="main" role="main" id="main-content">
  <header class="topbar">
    <div class="topbar-left">
      <h1>Relatórios</h1>
      <p id="reportsPeriodLabel">Análise detalhada dos seus gastos</p>
    </div>
    <div class="topbar-right">
      <nav class="period-tabs" aria-label="Seleção de período">
        <button class="period-tab" data-period="week" aria-pressed="false">Semana</button>
        <button class="period-tab active" data-period="month" aria-pressed="true">Mês</button>
        <button class="period-tab" data-period="quarter" aria-pressed="false">Trimestre</button>
        <button class="period-tab" data-period="year" aria-pressed="false">Ano</button>
      </nav>
      <button class="btn-export" aria-label="Exportar relatório em PDF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar PDF
      </button>
    </div>
  </header>

  <section class="kpis" id="kpisContainer" aria-label="Indicadores chave de desempenho">
    <!-- Dynamic KPIs -->
  </section>

  <div class="charts-row">
    <section class="chart-card" aria-labelledby="diario-title">
      <h3 id="diario-title">Gastos diários</h3>
      <div class="chart-canvas-wrap">
        <canvas id="barChart" role="img" aria-label="Gráfico de barras mostrando os gastos por dia do período selecionado"></canvas>
      </div>
    </section>
    <section class="chart-card" aria-labelledby="compare-title">
      <h3 id="compare-title">Evolução mensal (últimos 6 meses)</h3>
      <div class="chart-canvas-wrap">
        <canvas id="compareChart" role="img" aria-label="Gráfico de linha mostrando a evolução dos gastos mensais"></canvas>
      </div>
    </section>
  </div>

  <section class="cat-report" aria-labelledby="cat-report-title">
    <h3 id="cat-report-title">Relatório por categoria</h3>
    <div class="cat-rows" id="catReportRows">
      <!-- Dynamic Categories -->
    </div>
  </section>

  <section class="insights" aria-labelledby="insights-title">
    <h3 id="insights-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--green-100)" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Insights
    </h3>
    <div class="insights-grid" id="insightsGrid">
      <div style="padding:1rem; color:var(--text-muted)">Carregando insights...</div>
    </div>
  </section>
</main>

<script type="module">
function initRelatoriosPage() {
  const el = document.getElementById('kpisContainer');
  if (!el || el.dataset.initialized) return;
  el.dataset.initialized = 'true';

  let myBarChart = null;
  let myCompareChart = null;
  let currentPeriod = 'month';

  // Bug 3.8: Calcula start/end com base no período selecionado
  function getDateRange(period) {
    const now = new Date();
    let start, end;

    if (period === 'week') {
      const dayOfWeek = now.getDay();
      const diff = now.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
      start = new Date(now.setDate(diff));
      start.setHours(0, 0, 0, 0);
      end = new Date(start);
      end.setDate(start.getDate() + 6);
      end.setHours(23, 59, 59, 999);
    } else if (period === 'month') {
      start = new Date(now.getFullYear(), now.getMonth(), 1);
      end = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999);
    } else if (period === 'quarter') {
      const quarter = Math.floor(now.getMonth() / 3);
      start = new Date(now.getFullYear(), quarter * 3, 1);
      end = new Date(now.getFullYear(), quarter * 3 + 3, 0, 23, 59, 59, 999);
    } else if (period === 'year') {
      start = new Date(now.getFullYear(), 0, 1);
      end = new Date(now.getFullYear(), 11, 31, 23, 59, 59, 999);
    }

    return {
      startDate: start.toISOString().split('T')[0],
      endDate: end.toISOString().split('T')[0]
    };
  }

  function getPeriodLabel(period) {
    const now = new Date();
    const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    if (period === 'week') return 'Esta semana';
    if (period === 'month') return `${meses[now.getMonth()]} ${now.getFullYear()}`;
    if (period === 'quarter') {
      const q = Math.floor(now.getMonth() / 3) + 1;
      return `${q}º Trimestre ${now.getFullYear()}`;
    }
    if (period === 'year') return `Ano ${now.getFullYear()}`;
    return '';
  }

  // Bug 3.7 + 3.8: loadReports agora recebe datas reais e busca da API
  async function loadReports(startDate, endDate) {
    Utils.showLoading('kpisContainer');
    Utils.showLoading('catReportRows');

    try {
      const [summary, byCategory, trendData, dailyData] = await Promise.all([
        ReportService.getSummary(startDate, endDate),
        ReportService.getByCategory(startDate, endDate),
        ReportService.getTrend(),          // Sempre sem filtro para ter os 6 meses históricos
        ReportService.getDaily(startDate, endDate) // Novo endpoint de gastos diários
      ]);

      // KPIs
      const kpisContainer = document.getElementById('kpisContainer');
      kpisContainer.innerHTML = `
        <article class="kpi">
          <div class="kpi-label">Total Gasto</div>
          <div class="kpi-value">${Utils.formatCurrency(summary.totalSpent)}</div>
          <div class="kpi-badge badge-ok">${getPeriodLabel(currentPeriod)}</div>
        </article>
        <article class="kpi">
          <div class="kpi-label">Orçamento Restante</div>
          <div class="kpi-value">${Utils.formatCurrency(summary.remainingBudget)}</div>
          <div class="kpi-badge ${summary.overallPercentage > 80 ? 'badge-up' : 'badge-ok'}">${summary.overallPercentage.toFixed(1)}% utilizado</div>
        </article>
        <article class="kpi">
          <div class="kpi-label">Maior Gasto</div>
          <div class="kpi-value">${summary.largestExpense ? Utils.formatCurrency(summary.largestExpense.amount) : 'R$ 0,00'}</div>
          <div class="kpi-badge badge-warn">${summary.largestExpense ? sanitizeHtml(summary.largestExpense.description) : '-'}</div>
        </article>
      `;

      // Tabela por categoria
      const catContainer = document.getElementById('catReportRows');
      if (!byCategory || byCategory.length === 0) {
        catContainer.innerHTML = '<div style="padding:1.5rem; text-align:center; color:var(--text-muted);">Nenhum gasto neste período.</div>';
      } else {
        let html = `
          <div class="cat-row cat-row-head" role="row">
            <span>Categoria</span>
            <span>Progresso</span>
            <span style="text-align:right">Gasto</span>
            <span style="text-align:right">Orçamento</span>
            <span style="text-align:center">% Usado</span>
          </div>
        `;
        byCategory.forEach(cat => {
          let pctClass = 'pct-ok';
          if(cat.percentageUsed >= 80) pctClass = 'pct-warn';
          if(cat.percentageUsed >= 100) pctClass = 'pct-over';
          const width = cat.percentageUsed > 100 ? 100 : cat.percentageUsed;
          html += `
            <div class="cat-row" role="row">
              <div class="cat-info"><div class="cat-dot" aria-hidden="true" style="background:#27500A"></div><span class="cat-name">${sanitizeHtml(cat.categoryName)}</span></div>
              <div class="bar-outer" role="progressbar" aria-valuenow="${cat.percentageUsed.toFixed(0)}" aria-valuemin="0" aria-valuemax="100"><div class="bar-inner" style="width:${width}%;background:#27500A"></div></div>
              <div class="col-right col-spent">${Utils.formatCurrency(cat.totalSpent)}</div>
              <div class="col-right col-budget">${cat.budgetLimit ? Utils.formatCurrency(cat.budgetLimit) : 'Sem limite'}</div>
              <div style="text-align:center"><span class="pct-badge ${pctClass}">${cat.percentageUsed.toFixed(0)}%</span></div>
            </div>
          `;
        });
        catContainer.innerHTML = html;
      }

      // Bug 3.7: Gráfico de barras com dados REAIS de gastos diários
      if (myBarChart) myBarChart.destroy();
      const barCtx = document.getElementById('barChart').getContext('2d');
      const dailyLabels = dailyData && dailyData.length > 0 ? dailyData.map(d => d.day) : ['—'];
      const dailyValues = dailyData && dailyData.length > 0 ? dailyData.map(d => d.value) : [0];
      document.getElementById('diario-title').textContent = `Gastos diários — ${getPeriodLabel(currentPeriod)}`;
      myBarChart = new Chart(barCtx, {
        type: 'bar',
        data: {
          labels: dailyLabels,
          datasets: [{
            label: 'Gastos (R$)',
            data: dailyValues,
            backgroundColor: dailyValues.map(v => v > 0 ? '#3B6D11' : 'rgba(59,109,17,0.2)'),
            borderRadius: 4,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 11 }, color: '#888', callback: v => v === 0 ? '' : `R$ ${v}` } },
            x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#888', maxRotation: 0 } }
          }
        }
      });

      // Bug 3.7: Gráfico comparativo com dados REAIS de trend (6 meses históricos)
      if (myCompareChart) myCompareChart.destroy();
      const compareCtx = document.getElementById('compareChart').getContext('2d');
      const trendLabels = trendData && trendData.length > 0 ? trendData.map(t => t.period) : ['—'];
      const trendValues = trendData && trendData.length > 0 ? trendData.map(t => t.value) : [0];
      myCompareChart = new Chart(compareCtx, {
        type: 'line',
        data: {
          labels: trendLabels,
          datasets: [{
            label: 'Gastos mensais (R$)',
            data: trendValues,
            borderColor: '#3B6D11',
            backgroundColor: 'rgba(59,109,17,0.08)',
            borderWidth: 2,
            pointBackgroundColor: '#3B6D11',
            pointRadius: 4,
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 10 } } },
          scales: {
            y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 11 }, color: '#888' } },
            x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#888' } }
          }
        }
      });

    } catch (err) {
      console.error('[Relatórios] Erro ao carregar dados:', err);
      document.getElementById('kpisContainer').innerHTML = '<div style="padding:1rem; color:var(--text-muted)">Erro ao carregar relatórios.</div>';
    }
  }

  // Bug 3.8: Conectar botões de período à API
  document.querySelectorAll('.period-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-tab').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
      currentPeriod = btn.dataset.period;
      const label = getPeriodLabel(currentPeriod);
      document.getElementById('reportsPeriodLabel').textContent = `${label} — análise dos seus gastos`;
      const { startDate, endDate } = getDateRange(currentPeriod);
      loadReports(startDate, endDate);
    });
  });

  // Carregar relatório inicial (mês atual)
  const { startDate, endDate } = getDateRange('month');
  const label = getPeriodLabel('month');
  document.getElementById('reportsPeriodLabel').textContent = `${label} — análise dos seus gastos`;
  loadReports(startDate, endDate);

  document.addEventListener('turbo:before-cache', () => {
    if (myBarChart) { myBarChart.destroy(); myBarChart = null; }
    if (myCompareChart) { myCompareChart.destroy(); myCompareChart = null; }
  }, { once: true });
}

// 1. Run immediately
initRelatoriosPage();

// 2. Run on Turbo transitions
document.addEventListener('turbo:load', initRelatoriosPage);
</script>
</body>
